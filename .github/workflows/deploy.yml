name: Deploy .NET 10 App to Oracle Cloud (ARM64)

on:
  push:
    branches: [ "Member" ]
  workflow_dispatch: 

# 解決 Node.js 24 警告：全域開啟強制開關
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Publish App for ARM64
      # ⚠️ 修改重點：請將 "YourProjectName.csproj" 替換成你實際的專案檔名
      # 如果你的專案檔就在根目錄，可以用 ./Name.csproj
      run: |
        dotnet publish ./YourProjectName.csproj -c Release -r linux-arm64 --self-contained false -o ./publish

    - name: Copy files to Server via SSH
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: "publish/*"
        target: "/var/apps/demoapp"
        strip_components: 1

    - name: Restart Systemd Service
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          sudo systemctl restart demoapp.service
          sudo systemctl status demoapp.service
